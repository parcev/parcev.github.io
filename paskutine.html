<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>Eikite į dešinę</title>
<style>
  body {
    zoom: 2;
    background: linear-gradient(135deg, #c6ce70, #67ad66);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    transform: translateY(-30%);
  }

  /* Container styling like h1 */
  .container {
    max-width: 800px;
    padding: 30px;
    text-align: center;
    background: linear-gradient(135deg, #77ff76, #23c521dc);
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    line-height: 1.6;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .container:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
  }

  /* Optional: adjust h1 and h2 inside container */
  .container h1 {
    font-size: 2rem;
    color: #1a1a1a;
    margin: 0 0 20px 0;
  }

  .container h2 {
    font-size: 1.5rem;
    color: #333;
    margin: 0;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Išeikite iš picerijos, pasukite į dešinę ir ieškokite kiosko susijusio su informacinėmis technologijomis. Nufotografuokite jį.</h1>
  <h2>Sveikiname! Įveikėte žaidimą – galite grįžti ten, kur pradėjote</h2>
</div>

</body>
</html>
