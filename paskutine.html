<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>Eikite į dešinę</title>
<style>
  body {
    zoom: 2;
    background: linear-gradient(135deg, #fdfbfb, #ebedee);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    transform: translateY(-30%);
  }

  div {
    max-width: 800px;
    padding: 30px;
    text-align: center;
    font-size: 2rem;
    color: #1a1a1a;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    line-height: 1.6;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  h1:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
  }
</style>
</head>
<body>
<div>
<h1>Išeik iš picerijos, pasuk į dešinę ir ieškok kiosko susijusio su informacinėmis technologijomis. Nufotografuok jį.</h1>
<h2>Sveikiname! Įveikėte žaidimą – galite grįžti ten, kur pradėjote</h2>
</div>

</body>
</html>
