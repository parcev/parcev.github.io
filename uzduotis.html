<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picerijos užduotis</title>
  <style>
    /* General page styling */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #fceabb, #f8b500);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
      text-align: center;
      color: #333;
    }

    h1 {
      background: rgba(255, 255, 255, 0.85);
      padding: 20px 30px;
      border-radius: 15px;
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
      max-width: 600px;
      margin-bottom: 30px;
      font-size: 1.5rem;
    }

    #input {
      padding: 10px 15px;
      font-size: 1rem;
      border: 2px solid #f8b500;
      border-radius: 8px;
      outline: none;
      width: 200px;
      text-align: center;
      transition: 0.3s;
    }

    #input:focus {
      border-color: #ff6f61;
      box-shadow: 0 0 5px rgba(255, 111, 97, 0.5);
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      background-color: #ff6f61;
      color: white;
      border: none;
      border-radius: 8px;
      margin-left: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #ff3b2e;
      transform: scale(1.05);
    }

    #ArTeisingai {
      margin-top: 20px;
      font-weight: bold;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <h1>Suskaičiuokite, kiek picerijoje yra skirtingų picų, ir įveskite šį skaičių čia.</h1>
  <p id="ArTeisingai"></p>
  <input id="input" type="number" autofocus placeholder="Įrašyk, kiek yra picų">
  <button onclick="patikrinti()">Patvirtinti</button>

  <script>
    const ArTeisingai = document.getElementById("ArTeisingai");
    const input = document.getElementById("input");

    function patikrinti() {
      const ats = input.value.trim();
      if (ats === "27") {
        ArTeisingai.textContent = "Teisingai! Išeik iš picerijos, pasuk į dešinę, paeik 5 metrus ir ieškok kioskelio susijusio su informacinėmis technologijomis";
      } else {
        ArTeisingai.textContent = "Neteisingai! Bandyk dar kartą";
        input.value = "";
        input.focus();
      }
    }
  </script>
</body>
</html>
